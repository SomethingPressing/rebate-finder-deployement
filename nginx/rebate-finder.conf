# /etc/nginx/sites-available/rebate-finder
# Proxy Nginx → Next.js app on port 3000.
#
# Usage:
#   sudo cp nginx/rebate-finder.conf /etc/nginx/sites-available/rebate-finder
#   sudo ln -s /etc/nginx/sites-available/rebate-finder /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Then run Certbot to get SSL:
#   sudo certbot --nginx -d rebates.yourclient.com

server {
    listen 80;
    listen [::]:80;
    server_name rebates.yourclient.com;

    # Redirect all HTTP → HTTPS (Certbot will adjust this block automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rebates.yourclient.com;

    # SSL certificates — filled in by Certbot
    # ssl_certificate     /etc/letsencrypt/live/rebates.yourclient.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/rebates.yourclient.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options "nosniff"                             always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection       "1; mode=block"                       always;

    # Allow larger asset uploads (images, PDFs)
    client_max_body_size 50M;

    # Proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
