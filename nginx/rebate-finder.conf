# /etc/nginx/sites-available/rebate-finder
# Reverse proxy: port 80 → Next.js on localhost:3000
#
# server_name is set to _ (catch-all) by default.
# Replace _ with your real domain once DNS is pointed at this server:
#   sudo nano /etc/nginx/sites-available/rebate-finder
#   sudo nginx -t && sudo systemctl reload nginx
#
# To add SSL later (Let's Encrypt):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block"                   always;

    # Allow larger uploads (images, PDFs)
    client_max_body_size 50M;

    # Proxy to Next.js on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
